<!--
  Honeypot Deployer - Wazuh Active Response Configuration

  Add these directives to the Wazuh MANAGER's ossec.conf file.
  They define automated response actions when honeypot alerts fire.

  Install location: /var/ossec/etc/ossec.conf (on the Wazuh Manager)
-->

<!-- ============================================ -->
<!-- Command Definitions                          -->
<!-- ============================================ -->

<!-- Forensic snapshot command -->
<command>
  <name>honeypot-forensic-snapshot</name>
  <executable>honeypot-forensic-snapshot.sh</executable>
  <timeout_allowed>no</timeout_allowed>
</command>

<!-- ============================================ -->
<!-- Active Response Rules                        -->
<!-- ============================================ -->

<!-- Capture forensic snapshot on ANY honeypot alert -->
<active-response>
  <command>honeypot-forensic-snapshot</command>
  <location>local</location>
  <rules_group>honeypot</rules_group>
  <timeout>0</timeout>
</active-response>

<!-- Block attacker IP when infostealer behavior is detected -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100511,100520</rules_id>
  <timeout>3600</timeout>
</active-response>

<!-- Block attacker IP on exfiltration attempt -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100520,100521,100522</rules_id>
  <timeout>7200</timeout>
</active-response>
