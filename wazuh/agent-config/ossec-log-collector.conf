<!--
  Honeypot Deployer - Wazuh Manager Log Collection Configuration
  
  Add these directives to the Wazuh MANAGER's ossec.conf file to
  ingest logs from the Chain Monitor service.
  
  Install location: /var/ossec/etc/ossec.conf (on the Wazuh Manager)
-->

<!-- ============================================ -->
<!-- Chain Monitor Service Logs                   -->
<!-- ============================================ -->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/chain-monitor/events.json</location>
</localfile>

<!-- ============================================ -->
<!-- Honeypot Deployer Health Check Logs          -->
<!-- ============================================ -->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/honeypot-deployer/health.json</location>
</localfile>

<!-- ============================================ -->
<!-- Forensic Snapshot Summaries                  -->
<!-- ============================================ -->
<localfile>
  <log_format>json</log_format>
  <location>/var/ossec/logs/forensics/*/summary.json</location>
</localfile>
