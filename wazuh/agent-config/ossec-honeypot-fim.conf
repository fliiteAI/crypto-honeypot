<!--
  Honeypot Deployer - Wazuh Agent FIM Configuration Template
  
  This configuration snippet should be added to the <syscheck> section
  of the Wazuh agent's ossec.conf file on monitored endpoints.
  
  Install location: /var/ossec/etc/ossec.conf (inside <syscheck> block)
  
  NOTE: Replace /home/USER with the actual username on the target endpoint.
  The honeypot-deployer CLI can generate a customized version of this file
  using the 'wazuh-config' command.
  
  Prerequisites:
  - auditd must be installed and running (for whodata on Linux)
  - Wazuh agent 4.x+ with FIM module enabled
-->

<!-- ============================================ -->
<!-- Bitcoin Core wallet files                    -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.bitcoin/wallets</directories>

<!-- ============================================ -->
<!-- Ethereum keystore files                      -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.ethereum/keystore</directories>

<!-- ============================================ -->
<!-- Solana CLI wallet files                      -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.config/solana</directories>

<!-- ============================================ -->
<!-- Cardano signing keys                         -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.cardano</directories>

<!-- ============================================ -->
<!-- XRP wallet exports                           -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/Documents/xrp-wallet-backup.json</directories>

<!-- ============================================ -->
<!-- Electrum wallet files                        -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.electrum/wallets</directories>

<!-- ============================================ -->
<!-- Exodus desktop wallet                        -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.config/Exodus/exodus.wallet</directories>

<!-- ============================================ -->
<!-- Canary seed phrase files                     -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/Documents/seed-backup.txt</directories>

<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/Desktop/crypto-recovery.txt</directories>

<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/.config/.seed_phrase</directories>

<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/notes.txt</directories>

<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/Documents/wallet-backup.json</directories>

<!-- ============================================ -->
<!-- Developer .env files (leaked private keys)   -->
<!-- ============================================ -->
<directories check_all="yes" whodata="yes" realtime="yes"
  report_changes="yes">/home/USER/projects/defi-bot/.env</directories>

